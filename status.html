<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Statuts - Link Messenger</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/favicon.ico">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <meta name="theme-color" content="#008069">
</head>
<body>

<div class="app">

  <div class="header">
    <div class="header-left">
      <span class="app-name">🔵 Statuts</span>
    </div>
  </div>

  <div class="conversations" id="status-list">
    <div class="loading">
      <div class="spinner"></div>
      <p>Chargement...</p>
    </div>
  </div>

  <button class="fab" onclick="openStatusComposer()">📷</button>

  <!-- COMPOSITEUR DE STATUT -->
  <div class="status-composer-overlay" id="status-composer-overlay" style="display:none">
    <div class="status-composer-header">
      <button class="back-btn" onclick="closeStatusComposer()">←</button>
      <span>Nouveau statut</span>
    </div>
    <div class="status-composer-body" id="status-composer-body">
      <div class="status-mode-tabs">
        <button class="status-mode-tab active" id="mode-tab-photo" onclick="setComposerMode('photo')">📷 Photo</button>
        <button class="status-mode-tab" id="mode-tab-text" onclick="setComposerMode('text')">✏️ Texte</button>
      </div>

      <div id="composer-photo-mode">
        <div id="status-photo-preview" class="status-photo-preview">
          <button class="status-pick-photo-btn" onclick="document.getElementById('status-photo-input').click()">
            📷 Choisir une photo
          </button>
        </div>
        <input type="text" id="status-caption" placeholder="Ajouter une légende..." />
      </div>

      <div id="composer-text-mode" style="display:none">
        <textarea id="status-text-content" placeholder="Quoi de neuf ?" rows="5"></textarea>
      </div>

      <button class="settings-btn" onclick="publishStatus()">Publier le statut</button>
    </div>
    <input type="file" id="status-photo-input" accept="image/*" style="display:none" onchange="handleStatusPhoto(event)" />
  </div>

  <!-- VISIONNEUSE DE STATUT -->
  <div class="status-viewer-overlay" id="status-viewer-overlay" style="display:none" onclick="closeStatusViewer(event)">
    <div class="status-viewer-box">
      <div class="status-viewer-header">
        <div class="avatar" id="viewer-avatar" style="width:36px;height:36px;font-size:14px"></div>
        <div class="status-viewer-username" id="viewer-username"></div>
        <div class="status-viewer-time" id="viewer-time"></div>
        <button class="directory-close" onclick="closeStatusViewer()">✕</button>
      </div>
      <div class="status-viewer-content" id="status-viewer-content"></div>
    </div>
  </div>

  <div class="bottom-nav">
    <button class="nav-btn" onclick="window.location.href='home.html'">
      <span>💬</span>
      <span>Discussions</span>
    </button>
    <button class="nav-btn" onclick="window.location.href='calls.html'">
      <span>📞</span>
      <span>Appels</span>
    </button>
    <button class="nav-btn active">
      <span>🔵</span>
      <span>Statuts</span>
    </button>
    <button class="nav-btn" onclick="window.location.href='settings.html'">
      <span>⚙️</span>
      <span>Outils</span>
    </button>
  </div>

</div>

<script type="module" src="status.js"></script>
</body>
</html>
