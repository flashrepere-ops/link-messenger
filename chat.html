<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Link Messenger</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="chat-container">

  <!-- HEADER -->
  <div class="chat-header">
    <button class="back-btn" onclick="window.history.back()">←</button>
    <div class="chat-avatar-header" id="chat-avatar">?</div>
    <div class="chat-header-info">
      <div class="chat-username" id="chat-username">...</div>
      <div class="chat-status">en ligne</div>
    </div>
    <div class="chat-header-icons">
      <button class="chat-icon-btn">📹</button>
      <button class="chat-icon-btn">📞</button>
      <button class="chat-icon-btn">⋮</button>
    </div>
  </div>

  <!-- SÉLECTEUR EMOJIS -->
  <div class="emoji-picker" id="emoji-picker" style="display:none">
    <div class="emoji-categories">
      <button class="emoji-cat active" onclick="showEmojiCat(this, 'smileys')">😊</button>
      <button class="emoji-cat" onclick="showEmojiCat(this, 'gestures')">👋</button>
      <button class="emoji-cat" onclick="showEmojiCat(this, 'hearts')">❤️</button>
      <button class="emoji-cat" onclick="showEmojiCat(this, 'animals')">🐶</button>
      <button class="emoji-cat" onclick="showEmojiCat(this, 'food')">🍕</button>
      <button class="emoji-cat" onclick="showEmojiCat(this, 'travel')">✈️</button>
      <button class="emoji-cat" onclick="showEmojiCat(this, 'symbols')">💯</button>
    </div>
    <div class="emoji-grid" id="emoji-grid"></div>
  </div>

  <!-- INDICATEUR ENREGISTREMENT -->
  <div class="recording-indicator" id="recording-indicator" style="display:none">
    <div class="recording-dot"></div>
    <span>Enregistrement en cours...</span>
    <button onclick="cancelRecording()">✕</button>
  </div>

  <!-- MESSAGES -->
  <div class="messages-container" id="messages-container"></div>

  <!-- BARRE D'INPUT -->
  <div class="message-input-area">
    <button class="input-icon-btn" onclick="toggleEmoji()">😊</button>
    <input
      type="text"
      id="message-input"
      placeholder="Message"
    />
    <button class="input-icon-btn" onclick="openCamera()">📷</button>
    <button class="send-btn" id="send-btn" onclick="sendMessage()">🎤</button>
  </div>

</div>

<script type="module" src="chat.js"></script>
</body>
</html>
