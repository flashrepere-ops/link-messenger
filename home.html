<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Link Messenger</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <div class="app-logo">💬</div>
      <span class="app-name">Link Messenger</span>
    </div>
    <div class="header-right">
      <button class="icon-btn" onclick="showSearch()">🔍</button>
      <button class="icon-btn" onclick="logout()">⚙️</button>
    </div>
  </div>

  <!-- BARRE DE RECHERCHE -->
  <div id="search-box" style="display:none">
    <div class="search-bar">
      <span>🔍</span>
      <input type="text" id="search-input" placeholder="Rechercher un utilisateur..." />
    </div>
    <button class="search-btn" onclick="searchUser()">Chercher</button>
    <div id="search-result"></div>
  </div>

  <!-- ONGLETS -->
  <div class="tabs-bar">
    <button class="tab-btn active" onclick="switchTab(this, 'all')">Toutes</button>
    <button class="tab-btn" onclick="switchTab(this, 'unread')">Non lues</button>
    <button class="tab-btn" onclick="switchTab(this, 'favorites')">Favoris</button>
  </div>

  <!-- LISTE DES CONVERSATIONS -->
  <div class="conversations" id="conversations-list">
    <div class="loading">
      <div class="spinner"></div>
      <p>Chargement...</p>
    </div>
  </div>

  <!-- BOUTON NOUVEAU CHAT -->
  <button class="fab" onclick="showSearch()">✏️</button>

  <!-- BARRE DU BAS -->
  <div class="bottom-nav">
    <button class="nav-btn active">
      <span>💬</span>
      <span>Discussions</span>
    </button>
    <button class="nav-btn">
      <span>📞</span>
      <span>Appels</span>
    </button>
    <button class="nav-btn">
      <span>🔵</span>
      <span>Statuts</span>
    </button>
    <button class="nav-btn">
      <span>⚙️</span>
      <span>Outils</span>
    </button>
  </div>

</div>

<script type="module" src="home.js"></script>
</body>
</html>
