<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Link Messenger</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="chat-container">

  <!-- HEADER -->
  <div class="chat-header">
    <button class="back-btn" onclick="window.history.back()">←</button>
    <div class="chat-avatar-header" id="chat-avatar">?</div>
    <div class="chat-header-info">
      <div class="chat-username" id="chat-username">...</div>
      <div class="chat-status">en ligne</div>
    </div>
    <div class="chat-header-icons">
      <button class="chat-icon-btn" onclick="startVideoCall()">📹</button>
      <button class="chat-icon-btn" onclick="startAudioCall()">📞</button>
      <button class="chat-icon-btn">⋮</button>
    </div>
  </div>

  <!-- PANNEAU TROMBONE -->
  <div class="attach-panel" id="attach-panel" style="display:none">
    <div class="attach-grip"></div>
    <div class="attach-grid">
      <button class="attach-item" onclick="attachDocument()">
        <div class="attach-icon doc">📄</div>
        <span>Document</span>
      </button>
      <button class="attach-item" onclick="attachGallery()">
        <div class="attach-icon gal">🖼️</div>
        <span>Galerie</span>
      </button>
      <button class="attach-item" onclick="openCatalogue()">
        <div class="attach-icon cat">🏬</div>
        <span>Catalogue</span>
      </button>
      <button class="attach-item" onclick="openQuickReply()">
        <div class="attach-icon qr">⚡</div>
        <span>Réponse rapide</span>
      </button>
      <button class="attach-item" onclick="attachLocation()">
        <div class="attach-icon loc">📍</div>
        <span>Localisation</span>
      </button>
      <button class="attach-item" onclick="openContactPicker()">
        <div class="attach-icon contact">👤</div>
        <span>Contact</span>
      </button>
      <button class="attach-item" onclick="openPollCreator()">
        <div class="attach-icon poll">📊</div>
        <span>Sondage</span>
      </button>
      <button class="attach-item" onclick="openEventCreator()">
        <div class="attach-icon evt">📅</div>
        <span>Événement</span>
      </button>
    </div>
  </div>

  <!-- MODALE GÉNÉRIQUE (catalogue / sondage / événement / contact / réponse rapide) -->
  <div class="modal-overlay" id="modal-overlay" style="display:none" onclick="closeModal(event)">
    <div class="modal-box" id="modal-box"></div>
  </div>

  <!-- INDICATEUR ENREGISTREMENT -->
  <div class="recording-indicator" id="recording-indicator" style="display:none">
    <div class="recording-dot"></div>
    <span>Enregistrement en cours...</span>
    <button onclick="cancelRecording()">✕</button>
  </div>

  <!-- MESSAGES -->
  <div class="messages-container" id="messages-container"></div>

  <!-- BARRE D'INPUT -->
  <div class="message-input-area">
    <button class="input-icon-btn" onclick="toggleAttachPanel()">📎</button>
    <input
      type="text"
      id="message-input"
      placeholder="Message"
    />
    <button class="input-icon-btn" onclick="openCamera()">📷</button>
    <button class="send-btn" id="send-btn">🎤</button>
  </div>

  <input type="file" id="document-file" style="display:none" onchange="handleDocumentFile(event)" />
  <input type="file" id="gallery-file" accept="image/*" multiple style="display:none" onchange="handleGalleryFiles(event)" />

</div>

<script type="module" src="chat.js"></script>
</body>
</html>
