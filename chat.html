<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Link Messenger - Chat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="chat-container">

  <!-- HEADER -->
  <div class="chat-header">
    <button onclick="window.history.back()">⬅️</button>
    <div class="chat-user-info">
      <div class="avatar" id="chat-avatar" style="width:38px;height:38px;font-size:16px;margin-right:0">?</div>
      <div>
        <div id="chat-username" style="font-weight:600;color:#e9edef">...</div>
        <div style="font-size:12px;color:#8696a0">en ligne</div>
      </div>
    </div>
  </div>

  <!-- MESSAGES -->
  <div class="messages-container" id="messages-container"></div>

  <!-- INPUT -->
  <div class="message-input-area">
    <input
      type="text"
      id="message-input"
      placeholder="Écrire un message..."
    />
    <button class="send-btn" onclick="sendMessage()">➤</button>
  </div>

</div>

<script type="module" src="chat.js"></script>
</body>
</html>
