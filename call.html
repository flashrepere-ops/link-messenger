<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Appels - Link Messenger</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <div class="header">
    <div class="header-left">
      <span class="app-name">📞 Appels</span>
    </div>
  </div>

  <div class="conversations">
    <div style="text-align:center;padding:60px 20px;color:#8696a0">
      <div style="font-size:48px;margin-bottom:16px">📞</div>
      <p style="font-size:16px;margin-bottom:8px">Aucun appel récent</p>
      <p style="font-size:13px">Tes appels audio et vidéo apparaîtront ici</p>
    </div>
  </div>

  <div class="bottom-nav">
    <button class="nav-btn" onclick="window.location.href='home.html'">
      <span>💬</span>
      <span>Discussions</span>
    </button>
    <button class="nav-btn active">
      <span>📞</span>
      <span>Appels</span>
    </button>
    <button class="nav-btn" onclick="window.location.href='status.html'">
      <span>🔵</span>
      <span>Statuts</span>
    </button>
    <button class="nav-btn" onclick="window.location.href='settings.html'">
      <span>⚙️</span>
      <span>Outils</span>
    </button>
  </div>

</div>

<script>
  if (localStorage.getItem('darkMode') === 'true') {
    document.body.classList.add('dark-mode');
  }
</script>
</body>
</html>
